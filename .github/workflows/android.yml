name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create gradlew
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore znz-release.keystore \
          -alias znzkey -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass znzlibrary123 -keypass znzlibrary123 \
          -dname "CN=ZNZ Library, OU=ZNZ, O=ZNZ, L=Lahore, S=Punjab, C=PK"

    - name: Build Signed AAB
      run: ./gradlew bundleRelease
        
    - name: Sign AAB
      run: |
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore znz-release.keystore \
          -storepass znzlibrary123 -keypass znzlibrary123 \
          app/build/outputs/bundle/release/app-release.aab znzkey

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: ZNZ-Library-AAB
        path: app/build/outputs/bundle/release/app-release.aab
